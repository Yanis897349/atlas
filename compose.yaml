name: atlas

services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: atlas
      POSTGRES_PASSWORD: postgres
      POSTGRES_USER: postgres
    ports:
      - "${ATLAS_POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d atlas"]
      interval: 2s
      timeout: 5s
      retries: 10
    volumes:
      - atlas-postgres-data:/var/lib/postgresql/data
      - ./dev/postgres/init.sql:/docker-entrypoint-initdb.d/001-create-test-database.sql:ro

volumes:
  atlas-postgres-data:
